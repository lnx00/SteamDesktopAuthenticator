# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Publish .NET Application

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: windows-latest 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    # 1. Publish Framework-Dependent
    - name: Publish Framework-Dependent
      run: dotnet publish src/SteamDesktopAuthenticator/SteamDesktopAuthenticator.csproj -c Release --no-restore -o "${{ github.workspace }}\publish\framework-dependent"

    # 2. Publish Self-Contained (Single File)
    - name: Publish Self-Contained
      run: dotnet publish src/SteamDesktopAuthenticator/SteamDesktopAuthenticator.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true --no-restore -o "${{ github.workspace }}\publish\self-contained"

    # 3. Upload the Framework-Dependent build to GitHub Artifacts
    - name: Upload Framework-Dependent Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SteamDesktopAuthenticator-FrameworkDependent
        path: ${{ github.workspace }}\publish\framework-dependent\

    # 4. Upload the Self-Contained build to GitHub Artifacts
    - name: Upload Self-Contained Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SteamDesktopAuthenticator-SelfContained
        path: ${{ github.workspace }}\publish\self-contained\
